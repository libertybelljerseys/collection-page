<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liberty Bell Jerseys</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/no-save.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">
      <img class="brand-logo" src="https://images.squarespace-cdn.com/content/v1/5fa5834cd658574ae3274684/cb3a1a1e-fce3-4d90-b3bb-739c8451524d/lbj_patch_bolt.png?format=300w" alt="">
      <span class="brand-name">Liberty Bell Jerseys</span>
    </a>
  </header>

  <div class="page-title-block">
    <p class="eyebrow">The Collection</p>
    <h1 class="page-title">Jersey<br><em>Gallery</em></h1>
    <div class="title-divider"></div>
  </div>

  <main>
    <div class="grid" id="categories">Loading…</div>
  </main>

  <script type="module">
    import { getAlbums } from './js/data.js';
    import { CATEGORIES, ALBUM_CATEGORIES } from './js/categories.js';

    const el = document.getElementById('categories');
    try {
      const albums = await getAlbums();
      const byCategory = Object.fromEntries(CATEGORIES.map((c) => [c.slug, []]));
      const uncategorized = [];
      for (const a of albums) {
        const cat = ALBUM_CATEGORIES[a.id];
        if (cat && byCategory[cat]) byCategory[cat].push(a);
        else uncategorized.push(a);
      }

      el.innerHTML = CATEGORIES.map((c) => {
        const list = byCategory[c.slug];
        const cover = list[0]?.cover;
        return `
          <a class="tile${cover ? '' : ' no-cover'}" href="category.html?cat=${c.slug}">
            ${cover ? `<img src="${cover}" alt="" loading="lazy">` : ''}
            <h2>${c.label}</h2>
            <p>${list.length} album${list.length === 1 ? '' : 's'}</p>
          </a>
        `;
      }).join('') + (uncategorized.length ? `
        <a class="tile${uncategorized[0]?.cover ? '' : ' no-cover'} muted-tile" href="category.html?cat=uncategorized">
          ${uncategorized[0]?.cover ? `<img src="${uncategorized[0].cover}" alt="" loading="lazy">` : ''}
          <h2>Uncategorized</h2>
          <p>${uncategorized.length} album${uncategorized.length === 1 ? '' : 's'}</p>
        </a>
      ` : '');
    } catch (err) {
      el.innerHTML = `<p class="error">${err.message}. Run \`node scripts/fetch-data.mjs\` to generate data/.</p>`;
    }
  </script>
</body>
</html>
