<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liberty Bell Jerseys</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">
      <img class="brand-logo" src="https://images.squarespace-cdn.com/content/v1/5fa5834cd658574ae3274684/cb3a1a1e-fce3-4d90-b3bb-739c8451524d/lbj_patch_bolt.png?format=300w" alt="">
      <span class="brand-name">Liberty Bell Jerseys</span>
    </a>
    <nav class="breadcrumb" id="breadcrumb"><a href="index.html">Home</a></nav>
  </header>

  <div class="page-title-block">
    <p class="eyebrow" id="eyebrow">Collection</p>
    <h1 class="page-title" id="title">…</h1>
    <div class="title-divider"></div>
  </div>

  <main>
    <div class="grid" id="grid">Loading…</div>
  </main>

  <script type="module">
    import { getAlbums } from './js/data.js';
    import { CATEGORIES, ALBUM_CATEGORIES, ALBUM_TEAM } from './js/categories.js';
    import { TEAMS } from './js/teams.js';
    import { ALBUM_META } from './js/album-meta.js';

    const grid = document.getElementById('grid');
    const params = new URLSearchParams(location.search);
    const slug = params.get('cat') || '';
    const teamSlug = params.get('team');

    const meta = CATEGORIES.find((c) => c.slug === slug);
    const categoryLabel = meta ? meta.label : 'Uncategorized';
    const teamSplit = slug === 'nhl';

    try {
      const albums = await getAlbums();
      const inCategory = albums.filter((a) => (ALBUM_CATEGORIES[a.id] || 'uncategorized') === slug);

      if (teamSplit && !teamSlug) {
        document.getElementById('title').textContent = categoryLabel;
        document.getElementById('eyebrow').textContent = 'Collection';
        document.title = `${categoryLabel} — Liberty Bell Jerseys`;
        document.getElementById('breadcrumb').innerHTML = `<a href="index.html">Home</a> / ${categoryLabel}`;

        const teamTiles = TEAMS.map((t) => ({
          ...t,
          count: inCategory.filter((a) => ALBUM_TEAM[a.id] === t.slug).length,
        })).filter((t) => t.count > 0);
        const unassigned = inCategory.filter((a) => !ALBUM_TEAM[a.id]);

        grid.innerHTML = teamTiles.map((t) => `
          <a class="tile logo-tile" style="--accent:${t.color}" href="category.html?cat=${slug}&team=${t.slug}">
            <img src="${t.logo}" alt="" loading="lazy">
            <h2>${t.label}</h2>
            <p>${t.count} album${t.count === 1 ? '' : 's'}</p>
          </a>
        `).join('') + (unassigned.length ? `
          <a class="tile${unassigned[0].cover ? '' : ' no-cover'} muted-tile" href="category.html?cat=${slug}&team=none">
            ${unassigned[0].cover ? `<img src="${unassigned[0].cover}" alt="" loading="lazy">` : ''}
            <h2>Unassigned</h2>
            <p>${unassigned.length} album${unassigned.length === 1 ? '' : 's'}</p>
          </a>
        ` : '') || '<p class="error">No albums here yet.</p>';
      } else {
        let finalAlbums = inCategory;
        let teamLabel = null;
        if (teamSlug) {
          if (teamSlug === 'none') {
            finalAlbums = inCategory.filter((a) => !ALBUM_TEAM[a.id]);
            teamLabel = 'Unassigned';
          } else {
            finalAlbums = inCategory.filter((a) => ALBUM_TEAM[a.id] === teamSlug);
            teamLabel = TEAMS.find((t) => t.slug === teamSlug)?.label || teamSlug;
          }
        }

        const displayLabel = teamLabel || categoryLabel;
        document.getElementById('title').textContent = displayLabel;
        document.getElementById('eyebrow').textContent = teamLabel ? categoryLabel : 'Collection';
        document.title = `${displayLabel} — Liberty Bell Jerseys`;
        document.getElementById('breadcrumb').innerHTML = teamLabel
          ? `<a href="index.html">Home</a> / <a href="category.html?cat=${slug}">${categoryLabel}</a> / ${teamLabel}`
          : `<a href="index.html">Home</a> / ${categoryLabel}`;

        grid.innerHTML = finalAlbums.map((a) => `
          <a class="tile" href="album.html?id=${a.id}">
            <img src="${a.cover}" alt="" loading="lazy">
            <h3>${ALBUM_META[a.id]?.title || a.title}</h3>
            <p>${a.count} photo${a.count === 1 ? '' : 's'}</p>
          </a>
        `).join('') || '<p class="error">No albums here yet.</p>';
      }
    } catch (err) {
      grid.innerHTML = `<p class="error">${err.message}. Run \`node scripts/fetch-data.mjs\` to generate data/.</p>`;
    }
  </script>
</body>
</html>
